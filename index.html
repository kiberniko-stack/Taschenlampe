<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Taschenlampe">
    <title>Taschenlampe</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            transition: background 0.3s ease;
            overflow: hidden;
            touch-action: manipulation;
        }

        body.an {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .status {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .button-container {
            position: relative;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glow.aktiv {
            opacity: 1;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .taschenlampe-button {
            position: relative;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .taschenlampe-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .taschenlampe-button.an {
            background: #FFD700;
            box-shadow: 0 10px 40px rgba(255,215,0,0.6), 0 0 60px rgba(255,215,0,0.4);
        }

        .icon {
            width: 80px;
            height: 80px;
            transition: all 0.3s ease;
        }

        .icon.aus {
            fill: #333;
        }

        .icon.an {
            fill: #FF6B00;
            filter: drop-shadow(0 0 10px rgba(255,107,0,0.8));
        }

        .info {
            margin-top: 60px;
            color: white;
            font-size: 14px;
            opacity: 0.8;
        }

        .fehler {
            background: rgba(255,0,0,0.2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            max-width: 300px;
        }

        .debug {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-size: 10px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .debug.sichtbar {
            display: block;
        }

        .debug-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="debug-toggle" onclick="toggleDebug()">Debug</button>
    
    <div class="container">
        <div class="status" id="status">Taschenlampe aus</div>
        
        <div class="button-container">
            <div class="glow" id="glow"></div>
            <button class="taschenlampe-button" id="button" onclick="umschalten()">
                <svg class="icon aus" id="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 2h6l3 7v13H6V9l3-7z"/>
                    <path d="M9 9h6"/>
                    <circle cx="12" cy="15" r="3"/>
                </svg>
            </button>
        </div>

        <div class="info" id="info">Tippe auf die Taschenlampe</div>
        <div class="fehler" id="fehler" style="display: none;"></div>
    </div>

    <div class="debug" id="debug"></div>

    <script src="app.js"></script>
    <script>
        // Service Worker registrieren für PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('Service Worker registriert:', reg);
                        if (typeof log === 'function') log('✅ Service Worker registriert');
                    })
                    .catch(err => {
                        console.error('SW Fehler:', err);
                        if (typeof log === 'function') log('❌ SW Fehler: ' + err);
                    });
            });
        }

        // PWA Install Button Handler
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('Install Prompt verfügbar');
            if (typeof log === 'function') log('📱 App kann installiert werden!');
            
            // Zeige Info an User
            const info = document.getElementById('info');
            if (info) {
                info.innerHTML = '📱 Installiere die App: Tippe auf ⋮ → "App installieren"';
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('App installiert!');
            if (typeof log === 'function') log('🎉 App erfolgreich installiert!');
        });
    </script>
</body>
</html>
